name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install package with dependencies
        run: python -m pip install -e .[dev]

      - name: Run pytest
        run: python -m pytest tests/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Install wheel with dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl pytest

      - name: Smoke-test public API from installed wheel
        working-directory: /tmp
        run: |
          python -c "
          from taf import __version__
          from taf.evaluation.workflow import evaluate_files, EvaluationConfig
          from taf.methods.factory import SteganographyMethodFactory
          from taf.attacks import CorruptedWavFile, apply_all_attacks
          from taf.audio.io import load_audio, save_audio
          from taf.models.types import MethodType, MetricType
          print('the-a-files', __version__, 'public API import: OK')
          "

      - name: Run pytest against installed wheel
        working-directory: /tmp
        run: python -m pytest ${{ github.workspace }}/tests

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/the-a-files

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
