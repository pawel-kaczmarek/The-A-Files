[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "the-a-files"
version = "0.1.0"
description = "Audio steganography methods, attacks, and evaluation metrics."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
dependencies = [
    "bitstring==4.0.1",
    "librosa==0.9.2",
    "loguru==0.6.0",
    "mel_cepstral_distance==0.0.2",
    "museval==0.4.1",
    "numba==0.56.4",
    "numpy==1.23.5",
    "pesq==0.0.4",
    "pystoi==0.3.3",
    "PyWavelets==1.4.1",
    "PyYAML>=6.0",
    "scipy==1.9.3",
    "soundfile==0.11.0",
    "SRMRpy @ git+https://github.com/jfsantos/SRMRpy@5d3c134f775215556e813698d9352bc248718c0e",
    "tensorflow==2.12.1",
    "tensorflow_intel==2.12.1; platform_system == 'Windows'",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.urls]
Homepage = "https://github.com/pawelkaczmarek12/the-a-files"
Repository = "https://github.com/pawelkaczmarek12/the-a-files"
Issues = "https://github.com/pawelkaczmarek12/the-a-files/issues"

[project.scripts]
taf-eval = "taf.main:main"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["taf*"]

[tool.setuptools.package-data]
"taf.resources" = [
    "audio/*.wav",
    "datasets/*/*/*.flac",
]
"taf.resources.models.mosnet" = ["*.h5"]

[tool.pytest.ini_options]
testpaths = ["tests"]
