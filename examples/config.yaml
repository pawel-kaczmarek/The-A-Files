# Example EvaluationConfig — load with `EvaluationConfig.from_yaml("examples/config.yaml")`
# or `taf.evaluation.load_config("examples/config.yaml")`.
#
# Every field is optional; missing keys fall back to the dataclass default.

# --- Steganography method(s). MethodType enum names (case-insensitive). ---
methods:
  - LSB_METHOD
  - DCT_B1_METHOD

# --- Metric(s) to evaluate. MetricType enum names (case-insensitive). ---
metrics:
  - SNR_METRIC
  - PESQ_METRIC

# --- Decode mode. DIRECT (in-memory) or FILES (round-trip through disk). ---
target: FILES

# --- Audio container(s) used when target=FILES. Ignored when target=DIRECT. ---
formats:
  - wav
  - flac

output_dir: artifacts/evaluation
keep_files: true
overwrite: true
max_workers: 4

# --- Messages ---
random_seed: 20260520
random_messages:
  - length: 16
    count: 2
    name_prefix: r16
random_message_lengths: [8, 32]
random_messages_per_length: 2
messages:
  - name: hello
    bits: [1, 0, 1, 1, 0, 1, 0, 0]

# --- Codec-specific options forwarded to soundfile.write ---
codec_options:
  flac:
    subtype: PCM_24

# --- Workflow behavior ---
failure_policy: record  # or "raise" to abort on the first method/save error
